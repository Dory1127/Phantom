<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FloatDrive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-noise"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/>
        <rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.5"/>
        <rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.5"/>
        <rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/>
      </svg>
      <span class="logo-text">FloatDrive</span>
    </div>

    <div class="header-center">
      <span class="file-counter" id="fileCounter">— files floating</span>
    </div>

    <div class="header-right">
      <div class="guest-actions" id="guestActions">
        <button class="btn-ghost" onclick="App.openModal('login')">로그인</button>
        <button class="btn-primary" onclick="App.openModal('register')">회원가입</button>
      </div>
      <div class="user-actions hidden" id="userActions">
        <button class="btn-new" onclick="App.openModal('create')">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          새 파일
        </button>
        <div class="avatar-wrap" onclick="App.toggleUserMenu()">
          <div class="avatar" id="userAvatar"></div>
          <div class="user-menu hidden" id="userMenu">
            <div class="menu-name" id="menuName"></div>
            <div class="menu-divider"></div>
            <button onclick="App.logout()">로그아웃</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Canvas where files float -->
  <main class="canvas" id="canvas">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="4" width="18" height="18" rx="4" fill="currentColor" opacity="0.15"/>
          <rect x="26" y="4" width="18" height="18" rx="4" fill="currentColor" opacity="0.08"/>
          <rect x="4" y="26" width="18" height="18" rx="4" fill="currentColor" opacity="0.08"/>
          <rect x="26" y="26" width="18" height="18" rx="4" fill="currentColor" opacity="0.15"/>
        </svg>
      </div>
      <p class="empty-title">아직 파일이 없어요</p>
      <p class="empty-sub" id="emptySub">로그인하고 첫 파일을 올려보세요</p>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <!-- ───────────────── MODALS ───────────────── -->

  <!-- Login -->
  <div class="overlay hidden" id="loginOverlay">
    <div class="modal" id="loginModal">
      <button class="modal-x" onclick="App.closeModal('login')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="modal-logo">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/>
          <rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.5"/>
          <rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.5"/>
          <rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/>
        </svg>
      </div>
      <h2 class="modal-title">다시 오셨군요</h2>
      <p class="modal-sub">FloatDrive에 로그인하세요</p>
      <div class="field">
        <label>이메일</label>
        <input type="email" id="loginEmail" placeholder="hello@example.com" />
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="loginPw" placeholder="••••••••" />
      </div>
      <div class="field-error hidden" id="loginError"></div>
      <button class="btn-modal-primary" onclick="App.login()">로그인</button>
      <p class="modal-switch">계정이 없으신가요? <span onclick="App.switchModal('login','register')">회원가입</span></p>
    </div>
  </div>

  <!-- Register -->
  <div class="overlay hidden" id="registerOverlay">
    <div class="modal" id="registerModal">
      <button class="modal-x" onclick="App.closeModal('register')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="modal-logo">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/>
          <rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.5"/>
          <rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.5"/>
          <rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/>
        </svg>
      </div>
      <h2 class="modal-title">처음 오셨나요</h2>
      <p class="modal-sub">새 계정을 만들어보세요</p>
      <div class="field">
        <label>사용자 이름</label>
        <input type="text" id="regUsername" placeholder="username" />
      </div>
      <div class="field">
        <label>이메일</label>
        <input type="email" id="regEmail" placeholder="hello@example.com" />
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="regPw" placeholder="••••••••" />
      </div>
      <div class="field-error hidden" id="registerError"></div>
      <button class="btn-modal-primary" onclick="App.register()">계정 만들기</button>
      <p class="modal-switch">이미 계정이 있으신가요? <span onclick="App.switchModal('register','login')">로그인</span></p>
    </div>
  </div>

  <!-- Create File -->
  <div class="overlay hidden" id="createOverlay">
    <div class="modal" id="createModal">
      <button class="modal-x" onclick="App.closeModal('create')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <h2 class="modal-title">새 파일 만들기</h2>
      <p class="modal-sub">파일 이름과 보안 설정을 입력하세요</p>
      <div class="field">
        <label>파일 이름</label>
        <input type="text" id="createName" placeholder="내 소중한 파일" />
      </div>
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-label">비밀번호 보호</span>
          <span class="toggle-desc">파일을 열 때 비밀번호가 필요해요</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="createPwToggle" onchange="App.togglePwField()" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="field hidden" id="createPwField">
        <label>파일 비밀번호</label>
        <input type="password" id="createPw" placeholder="파일 전용 비밀번호" />
      </div>
      <div class="field-error hidden" id="createError"></div>
      <button class="btn-modal-primary" onclick="App.createFile()">파일 생성</button>
    </div>
  </div>

  <!-- File Password Verify -->
  <div class="overlay hidden" id="verifyOverlay">
    <div class="modal modal-sm" id="verifyModal">
      <button class="modal-x" onclick="App.closeModal('verify')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="lock-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>
      </div>
      <h2 class="modal-title">비밀번호 확인</h2>
      <p class="modal-sub" id="verifyFileName">이 파일은 보호되어 있어요</p>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="verifyPw" placeholder="••••••••" onkeydown="if(event.key==='Enter') App.verifyFile()" />
      </div>
      <div class="field-error hidden" id="verifyError">비밀번호가 틀렸습니다</div>
      <button class="btn-modal-primary" onclick="App.verifyFile()">열기</button>
    </div>
  </div>

  <!-- File Info -->
  <div class="overlay hidden" id="infoOverlay">
    <div class="modal modal-sm" id="infoModal">
      <button class="modal-x" onclick="App.closeModal('info')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="info-folder-icon" id="infoFolderIcon"></div>
      <h2 class="modal-title" id="infoFileName"></h2>
      <div class="info-rows">
        <div class="info-row"><span>업로더</span><span id="infoUploader"></span></div>
        <div class="info-row"><span>생성일</span><span id="infoDate"></span></div>
        <div class="info-row"><span>보호 여부</span><span id="infoProtected"></span></div>
      </div>
      <button class="btn-delete hidden" id="infoDeleteBtn" onclick="App.deleteFileFromInfo()">삭제</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
